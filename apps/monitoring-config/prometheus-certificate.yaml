apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-cert
spec:
  commonName: prometheus.0x42labs.net
  dnsNames:
  - prometheus.0x42labs.net
  duration: 8760h
  issuerRef:
    kind: ClusterIssuer
    name: internal-ca-issuer
  renewBefore: 720h
  secretName: prometheus-tls
