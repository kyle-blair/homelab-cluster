apiVersion: apps/v1
kind: Deployment
metadata:
  name: dhcp
  labels:
    app.kubernetes.io/name: dhcp
    app.kubernetes.io/part-of: network
    app.kubernetes.io/component: dhcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dhcp
      app.kubernetes.io/part-of: network
      app.kubernetes.io/component: dhcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dhcp
        app.kubernetes.io/part-of: network
        app.kubernetes.io/component: dhcp
    spec:
      enableServiceLinks: false
      containers:
        - name: kea-dhcp4
          image: docker.cloudsmith.io/isc/docker/kea-dhcp4@sha256:a95772302778ee7817ad081ffd340fa1bab14810831e40b7e4149d917b625b2c
          imagePullPolicy: IfNotPresent
          ports:
            - name: dhcp
              containerPort: 67
              protocol: UDP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/kea/kea-dhcp4.conf
              subPath: configuration.json
              readOnly: true
            - name: leases
              mountPath: /var/lib/kea
            - name: run
              mountPath: /run/kea
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
      volumes:
        - name: config
          configMap:
            name: dhcp-config
        - name: leases
          persistentVolumeClaim:
            claimName: dhcp-leases
        - name: run
          emptyDir: {}
