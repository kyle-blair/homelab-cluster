apiVersion: v1
kind: Service
metadata:
  name: dns-ingress
  annotations:
    metallb.io/loadBalancerIPs: 10.0.10.61
  labels:
    app.kubernetes.io/name: dns-ingress
    app.kubernetes.io/part-of: dns
    app.kubernetes.io/component: ingress
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: dns-filter
    app.kubernetes.io/part-of: dns
    app.kubernetes.io/component: filter
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
