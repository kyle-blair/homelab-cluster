apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: internal-ca-bundle
spec:
  sources:
    - useDefaultCAs: true
    - secret:
        name: internal-ca
        key: tls.crt
  target:
    configMap:
      key: ca-certificates.crt
      metadata:
        labels:
          app.kubernetes.io/component: trust-bundle
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: Exists
