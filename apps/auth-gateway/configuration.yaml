# Authelia configuration for LDAP-backed auth, forward-auth, and OIDC
server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info

theme: dark

session:
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 15m
  remember_me: 6 hours
  cookies:
    - domain: 0x42labs.net
      authelia_url: https://auth.0x42labs.net
      default_redirection_url: https://grafana.0x42labs.net
  # secret provided via env: AUTHELIA_SESSION_SECRET_FILE

identity_validation:
  # jwt_secret provided via env: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
  reset_password: {}

storage:
  local:
    path: /var/lib/authelia/db.sqlite3
  # encryption_key provided via env: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE

authentication_backend:
  password_reset:
    disable: true
  ldap:
    implementation: custom
    address: ldap://ldap.auth.svc.cluster.local:389
    timeout: 5s
    start_tls: false
    base_dn: dc=0x42labs,dc=net
    additional_users_dn: ou=people
    users_filter: '(&({username_attribute}={input})(objectClass=person))'
    additional_groups_dn: ou=groups
    groups_filter: '(&(member={dn})(objectClass=groupOfNames))'
    attributes:
      username: uid
      display_name: cn
      mail: mail
      group_name: cn
    user: cn=admin,dc=0x42labs,dc=net
    # password provided via env: AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE

access_control:
  default_policy: deny
  rules:
    - domain:
        - 0x42labs.net
        - '*.0x42labs.net'
      policy: one_factor
      subject:
        - 'group:admins'

identity_providers:
  oidc:
    jwks:
      - key: {{ secret "/app/secrets/OIDC_JWKS_KEY" | mindent 10 "|" | msquote }}
    claims_policies:
      argocd:
        id_token:
          - email
          - groups
          - preferred_username
    clients:
      - client_id: argocd
        client_name: Argo CD
        public: true
        authorization_policy: one_factor
        claims_policy: argocd
        consent_mode: pre-configured
        pre_configured_consent_duration: 90 days
        redirect_uris:
          - https://argocd.0x42labs.net/auth/callback
          - http://localhost:8085/auth/callback
        scopes:
          - openid
          - profile
          - email
          - groups
        token_endpoint_auth_method: none
      - client_id: grafana
        client_name: Grafana
        public: true
        authorization_policy: one_factor
        consent_mode: pre-configured
        pre_configured_consent_duration: 90 days
        redirect_uris:
          - https://grafana.0x42labs.net/login/generic_oauth
        scopes:
          - openid
          - profile
          - email
          - groups
        token_endpoint_auth_method: none

notifier:
  disable_startup_check: true
  filesystem:
    filename: /var/lib/authelia/notification.txt
