# Authelia configuration for LDAP-backed auth, forward-auth, and OIDC
server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info

theme: dark

default_redirection_url: https://grafana.0x42labs.net

session:
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 15m
  domain: 0x42labs.net
  # secret provided via env: AUTHELIA_SESSION_SECRET

storage:
  local:
    path: /var/lib/authelia/db.sqlite3
  # encryption_key via env: AUTHELIA_STORAGE_ENCRYPTION_KEY

authentication_backend:
  password_reset:
    disable: true
  ldap:
    implementation: custom
    address: ldap://ldap.auth.svc.cluster.local:389
    timeout: 5s
    start_tls: false
    base_dn: dc=0x42labs,dc=net
    username_attribute: uid
    additional_users_dn: ou=people
    users_filter: '(&(objectClass=person)(uid={input}))'
    additional_groups_dn: ou=groups
    groups_filter: '(|(member={dn})(uniqueMember={dn}))'
    group_name_attribute: cn
    mail_attribute: mail
    display_name_attribute: cn
    user: cn=admin,dc=0x42labs,dc=net
    # password via env: AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD

access_control:
  default_policy: deny
  rules:
    - domain:
        - 0x42labs.net
        - '*.0x42labs.net'
      policy: one_factor
      subject:
        - 'group:admins'

identity_providers:
  oidc:
    jwks:
      - key: {{ secret "/config/secrets/OIDC_JWKS_KEY" | mindent 10 "|" | msquote }}
    clients:
      - client_id: argocd
        client_name: Argo CD
        public: true
        authorization_policy: one_factor
        redirect_uris:
          - https://argocd.0x42labs.net/auth/callback
          - http://localhost:8085/auth/callback
        scopes:
          - openid
          - profile
          - email
          - groups
        token_endpoint_auth_method: none

notifier:
  disable_startup_check: true
  filesystem:
    filename: /var/lib/authelia/notification.txt

# JWT secret via env: AUTHELIA_JWT_SECRET
