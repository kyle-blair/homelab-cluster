apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logs
resources:
  - service-account.yaml
  - cluster-role.yaml
  - cluster-role-binding.yaml
  - node-daemonset.yaml
  - syslog-deployment.yaml
  - syslog-service.yaml
configMapGenerator:
  - name: node-log-collector-config
    files:
      - node-configuration.toml
  - name: syslog-collector-config
    files:
      - syslog-configuration.toml
