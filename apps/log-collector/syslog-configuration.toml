data_dir = "/var/lib/vector"

[sources.syslog_tcp]
type = "syslog"
mode = "tcp"
address = "0.0.0.0:1514"

[sources.syslog_udp]
type = "syslog"
mode = "udp"
address = "0.0.0.0:1514"

[transforms.syslog_metadata]
type = "remap"
inputs = ["syslog_tcp", "syslog_udp"]
source = '''
.device = to_string(.hostname ?? .host ?? "unknown") ?? "unknown"
.facility_label = to_string(.facility ?? "unknown") ?? "unknown"
.severity_label = to_string(.severity ?? "unknown") ?? "unknown"
'''

[sinks.log_storage]
type = "loki"
inputs = ["syslog_metadata"]
endpoint = "http://log-storage.logs.svc.cluster.local:3100"
encoding.codec = "json"
labels.job = "syslog"
labels.device = "{{ device }}"
labels.facility = "{{ facility_label }}"
labels.severity = "{{ severity_label }}"
