apiVersion: v1
kind: Service
metadata:
  name: syslog-collector
  labels:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/component: syslog
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: log-collector
    app.kubernetes.io/component: syslog
  ports:
    - name: syslog-tcp
      port: 514
      targetPort: syslog-tcp
      protocol: TCP
    - name: syslog-udp
      port: 514
      targetPort: syslog-udp
      protocol: UDP
