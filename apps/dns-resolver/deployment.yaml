apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-resolver
  labels:
    app.kubernetes.io/name: dns-resolver
    app.kubernetes.io/part-of: dns
    app.kubernetes.io/component: resolver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-resolver
      app.kubernetes.io/part-of: dns
      app.kubernetes.io/component: resolver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-resolver
        app.kubernetes.io/part-of: dns
        app.kubernetes.io/component: resolver
    spec:
      enableServiceLinks: false
      containers:
        - name: dns-resolver
          image: docker.io/powerdns/pdns-recursor-54:5.4.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: dns-tcp
              containerPort: 1053
              protocol: TCP
            - name: dns-udp
              containerPort: 1053
              protocol: UDP
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/powerdns/recursor.d/cluster.yml
              subPath: configuration.yaml
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: dns-resolver-config
