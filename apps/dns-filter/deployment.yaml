apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-filter
  labels:
    app.kubernetes.io/name: dns-filter
    app.kubernetes.io/part-of: dns
    app.kubernetes.io/component: filter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-filter
      app.kubernetes.io/part-of: dns
      app.kubernetes.io/component: filter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-filter
        app.kubernetes.io/part-of: dns
        app.kubernetes.io/component: filter
    spec:
      enableServiceLinks: false
      containers:
        - name: dns-filter
          image: docker.io/spx01/blocky:v0.33.0
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/blocky/configuration.yaml
          ports:
            - name: dns-tcp
              containerPort: 1053
              protocol: TCP
            - name: dns-udp
              containerPort: 1053
              protocol: UDP
            - name: http
              containerPort: 4000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/blocky
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: dns-filter-config
        - name: tmp
          emptyDir: {}
