      ansible_host: 10.0.120.20
      ansible_user: operator
      node_labels:
        0x42labs.net/network-connection: wifi
    node1:
      ansible_host: 10.0.120.21
      ansible_user: operator
      node_labels:
        0x42labs.net/network-connection: wifi
    node2:
